<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Priority & Subtask Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: transparent;
            color: #37352f;
        }
        .notion-card {
            background: white;
            border: 1px solid rgba(15, 15, 15, 0.1);
            border-radius: 8px;
            transition: background 120ms ease-in;
        }
        .notion-input {
            border: 1px solid rgba(15, 15, 15, 0.1);
            background: rgba(242, 241, 238, 0.6);
            border-radius: 4px;
            padding: 4px 8px;
        }
        .notion-btn {
            background: #2383e2;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .notion-btn:hover { opacity: 0.8; }
        .tag-urgent { background: #fee2e2; color: #991b1b; }
        .tag-important { background: #fef3c7; color: #92400e; }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #2383e2;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

<div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold flex items-center gap-2">
            🚀 Fokus-Planer
        </h1>
        <div id="status-badge" class="text-xs text-gray-400">Status: Aktiv</div>
    </div>

    <!-- Eingabe Bereich -->
    <div class="notion-card p-6 mb-6 shadow-sm">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Was steht an?</label>
                <input type="text" id="task-name" class="w-full notion-input text-lg" placeholder="z.B. Projektabschluss vorbereiten...">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Wichtigkeit</label>
                    <select id="importance" class="w-full notion-input">
                        <option value="high">Hoch (Fokus-Aufgabe)</option>
                        <option value="low">Niedrig (Admin/Routine)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Dringlichkeit</label>
                    <select id="urgency" class="w-full notion-input">
                        <option value="high">Hoch (Sofort fällig)</option>
                        <option value="low">Niedrig (Kein Zeitdruck)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Zeit (Min)</label>
                    <input type="number" id="estimated-time" class="w-full notion-input" placeholder="30">
                </div>
                <div class="flex items-end">
                    <button id="add-task-btn" class="notion-btn w-full">Analysieren & Erstellen</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Liste -->
    <div id="task-container" class="space-y-4"></div>
</div>

<script>
    /**
     * WICHTIG: Erstelle einen API-Key unter https://aistudio.google.com/
     * Ohne Key werden nur Standard-Häppchen generiert.
     */
    const apiKey = ""; 

    const taskContainer = document.getElementById('task-container');
    const addTaskBtn = document.getElementById('add-task-btn');

    addTaskBtn.addEventListener('click', async () => {
        const name = document.getElementById('task-name').value;
        const importance = document.getElementById('importance').value;
        const urgency = document.getElementById('urgency').value;
        const timeInput = document.getElementById('estimated-time').value;
        const time = parseInt(timeInput) || 30;

        if (!name.trim()) {
            alert("Bitte gib einen Aufgabennamen ein.");
            return;
        }

        const realTime = Math.ceil(time * 1.2);
        const taskId = Date.now();
        
        createTaskElement(taskId, name, importance, urgency, realTime);
        document.getElementById('task-name').value = '';
        document.getElementById('estimated-time').value = '';
        
        startSubtaskGeneration(taskId, name);
    });

    function createTaskElement(id, name, importance, urgency, time) {
        const priorityLabel = (importance === 'high' && urgency === 'high') ? '🔥 Do First' :
                             (importance === 'high' && urgency === 'low') ? '📅 Schedule' :
                             (importance === 'low' && urgency === 'high') ? '🤝 Delegate' : '🗑️ Don\'t Do';

        const html = `
            <div id="task-${id}" class="notion-card p-4 border-l-4 ${importance === 'high' ? 'border-blue-500' : 'border-gray-300'}" 
                 data-task-name="${name}" 
                 data-importance="${importance}" 
                 data-urgency="${urgency}"
                 data-priority-label="${priorityLabel}">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold text-lg task-title">${name}</h3>
                        <div class="text-xs text-gray-500 mt-1 task-meta">Status: ${priorityLabel} | Zeit: ${time} Min</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyToNotion(${id})" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded transition-colors">📋 Copy for Page</button>
                        <button onclick="document.getElementById('task-${id}').remove()" class="text-xs hover:text-red-500 px-1">🗑️</button>
                    </div>
                </div>
                <div id="subtasks-${id}" class="mt-4 pl-4 border-l border-gray-200 space-y-1">
                    <div class="loader-area text-xs text-gray-400 italic flex items-center gap-2">
                        <div class="loader"></div> Erstelle Häppchen...
                    </div>
                </div>
            </div>
        `;
        taskContainer.insertAdjacentHTML('afterbegin', html);
    }

    async function startSubtaskGeneration(taskId, taskName) {
        if (!apiKey || apiKey.trim() === "") {
            renderSubtasks(taskId, ["Aufgabe strukturieren", "Erste Schritte planen", "Ergebnis prüfen"]);
            return;
        }

        const success = await fetchAI(taskId, taskName);
        if (!success) {
            // Fallback bei Fehler
            renderSubtasks(taskId, ["Vorbereiten", "Durchführen", "Nachbereiten & Review"]);
        }
    }

    async function fetchAI(taskId, taskName) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const systemPrompt = "Zerlege die Aufgabe in max. 4 konkrete, kurze Teilschritte (Häppchen). Antworte NUR als JSON-Liste von Strings, z.B. [\"Schritt 1\", \"Schritt 2\"].";

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Task: ${taskName}` }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { 
                        responseMimeType: "application/json",
                        temperature: 0.7 
                    }
                })
            });

            if (!response.ok) throw new Error('API offline');

            const result = await response.json();
            const textResponse = result.candidates[0].content.parts[0].text;
            const subtasks = JSON.parse(textResponse);
            
            renderSubtasks(taskId, subtasks);
            return true;
        } catch (error) {
            console.error("Fehler bei der KI-Generierung:", error);
            return false;
        }
    }

    function renderSubtasks(taskId, subtasks) {
        const subtaskContainer = document.getElementById(`subtasks-${taskId}`);
        if (!subtaskContainer) return;

        subtaskContainer.innerHTML = '';
        subtasks.forEach(st => {
            const div = document.createElement('div');
            div.className = "flex items-center gap-2 text-sm subtask-item text-gray-700";
            div.innerHTML = `<span>•</span> <span>${st}</span>`;
            subtaskContainer.appendChild(div);
        });
    }

    function copyToNotion(id) {
        const taskEl = document.getElementById(`task-${id}`);
        const title = taskEl.querySelector('.task-title').innerText;
        const meta = taskEl.querySelector('.task-meta').innerText;
        const priorityLabel = taskEl.dataset.priorityLabel;
        const importance = taskEl.dataset.importance === 'high' ? 'Wichtig' : 'Routine';
        const urgency = taskEl.dataset.urgency === 'high' ? 'Dringend' : 'Nicht dringend';
        
        const subtasks = Array.from(taskEl.querySelectorAll('.subtask-item'))
            .map(s => s.innerText.replace('• ', '').trim());
        
        // Formatierter Block für Notion
        let text = `${title}\n`; 
        text += `\n--- Details ---\n`;
        text += `• Priorität: ${priorityLabel}\n`;
        text += `• ${meta.split('|')[1].trim()}\n`;
        text += `• Relevanz: ${importance} & ${urgency}\n`;
        text += `\n--- Häppchen ---\n`;
        
        subtasks.forEach(st => {
            text += `\t[] ${st}\n`; 
        });

        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        
        try {
            document.execCommand('copy');
            const btn = taskEl.querySelectorAll('button')[0];
            const originalText = btn.innerText;
            btn.innerText = '✅ Kopiert!';
            btn.style.backgroundColor = '#dcfce7'; 
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = '#f3f4f6';
            }, 2000);
        } catch (err) {
            console.error('Kopieren fehlgeschlagen', err);
        }
        
        document.body.removeChild(el);
    }
</script>

</body>
</html>
